<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今生课题 · 灵魂坐标 · 兑换码领取</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--deep:#080612;--gold:#c9a84c;--gold2:#e8c97a;--cream:#f0e8d8;--mist:#9b8fb5;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--deep);color:var(--cream);font-family:'Noto Serif SC',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

.bg-stars{position:fixed;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 50%,rgba(201,168,76,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 15%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 70%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 30%,rgba(201,168,76,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 85%,rgba(255,255,255,.5) 0%,transparent 100%);}
.bg-nebula{position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 20% 30%,rgba(107,79,160,.12) 0%,transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 70%,rgba(60,30,120,.14) 0%,transparent 70%);}

.container{position:relative;z-index:10;max-width:480px;width:100%;text-align:center;}

/* Loading state */
.loading-wrap{padding:60px 0;}
.orbit{width:80px;height:80px;margin:0 auto 24px;position:relative;}
.ring{position:absolute;inset:0;border-radius:50%;border:1px solid transparent;animation:spin 2s linear infinite;}
.ring:nth-child(1){border-top-color:var(--gold);animation-duration:1.4s;}
.ring:nth-child(2){border-right-color:rgba(201,168,76,.5);animation-duration:2.3s;animation-direction:reverse;inset:14px;}
.ring:nth-child(3){border-bottom-color:rgba(201,168,76,.3);animation-duration:3.2s;inset:28px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--mist);letter-spacing:3px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

/* Success state */
.success-wrap{display:none;animation:fadeUp .8s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.check-icon{font-size:52px;margin-bottom:20px;display:block;animation:popIn .5s ease .3s both;}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

.success-title{font-size:22px;font-weight:300;letter-spacing:4px;margin-bottom:8px;}
.success-sub{font-size:13px;color:var(--mist);letter-spacing:2px;line-height:2;margin-bottom:32px;}

/* Code display */
.code-box{
  background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));
  border:1px solid rgba(201,168,76,.4);
  border-radius:16px;
  padding:32px 24px;
  margin-bottom:24px;
  position:relative;
}
.code-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--gold);margin-bottom:16px;opacity:.8;}
.code-value{
  font-size:36px;font-weight:600;
  letter-spacing:10px;color:var(--gold2);
  margin-bottom:16px;
  text-shadow:0 0 20px rgba(201,168,76,.3);
  font-family:'Cinzel',serif;
}
.code-hint{font-size:12px;color:var(--mist);letter-spacing:1px;line-height:2;}
.code-meta{
  display:flex;justify-content:center;gap:20px;
  margin-top:16px;padding-top:16px;
  border-top:1px solid rgba(201,168,76,.15);
}
.meta-item{text-align:center;}
.meta-num{font-size:20px;color:var(--gold2);font-family:'Cinzel',serif;}
.meta-txt{font-size:10px;color:var(--mist);letter-spacing:1px;margin-top:2px;}

/* Copy button */
.copy-btn{
  width:100%;padding:14px;
  background:rgba(201,168,76,.12);
  border:1px solid rgba(201,168,76,.3);
  border-radius:10px;
  color:var(--gold2);
  font-family:'Noto Serif SC',serif;
  font-size:14px;letter-spacing:3px;
  cursor:pointer;transition:all .3s;
  margin-bottom:12px;
}
.copy-btn:hover{background:rgba(201,168,76,.2);border-color:var(--gold);}
.copy-btn.copied{background:rgba(74,155,142,.15);border-color:rgba(74,155,142,.4);color:#7eccc3;}

/* Use now button */
.use-btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--gold),#a07830);
  border:none;border-radius:12px;
  color:#080612;
  font-family:'Noto Serif SC',serif;
  font-size:16px;letter-spacing:4px;
  cursor:pointer;font-weight:600;
  transition:all .3s;
  box-shadow:0 4px 20px rgba(201,168,76,.3);
  margin-bottom:16px;
}
.use-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.4);}

/* 倒计时进度条 */
.countdown-bar{
  height:3px;
  background:rgba(255,255,255,.3);
  border-radius:2px;
  margin-top:12px;
  width:100%;
  position:relative;
  overflow:hidden;
}
.countdown-bar::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(255,255,255,.8);
  border-radius:2px;
  width:100%;
  animation:countdownShrink 5s linear forwards;
}
@keyframes countdownShrink{
  from{width:100%}
  to{width:0%}
}
.use-btn .countdown-label{
  font-size:11px;opacity:.7;
  margin-top:4px;display:block;
  letter-spacing:1px;
}

.save-reminder{
  font-size:11px;color:rgba(155,143,181,.5);
  letter-spacing:1px;line-height:2;
  padding:12px 16px;
  border:1px solid rgba(155,143,181,.1);
  border-radius:8px;
  margin-bottom:20px;
}

/* Error state */
.error-wrap{display:none;padding:40px 20px;}
.error-icon{font-size:44px;margin-bottom:16px;display:block;}
.error-title{font-size:18px;letter-spacing:2px;margin-bottom:8px;color:#e8a0b0;}
.error-msg{font-size:13px;color:var(--mist);line-height:2;margin-bottom:24px;}
.retry-btn{background:none;border:1px solid rgba(196,122,138,.3);border-radius:8px;padding:10px 24px;color:#e8a0b0;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:2px;cursor:pointer;}
</style>
</head>
<body>

<!--
  ★ 配置说明 ★
  把下面的 CONFIG 替换成你的真实值
  MAIN_URL = 今生课题 · 灵魂坐标主页面的地址（如 https://mingyunluopan.vercel.app）
-->
<script>
const CONFIG = {
  SUPABASE_URL:  'YOUR_SUPABASE_URL',
  SUPABASE_ANON: 'YOUR_SUPABASE_ANON_KEY',
  MAIN_URL:      'YOUR_MAIN_PAGE_URL',
}
</script>

<div class="bg-stars"></div>
<div class="bg-nebula"></div>

<div class="container">

  <!-- Loading -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="orbit">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <div class="loading-text">正在生成你的兑换码...</div>
  </div>

  <!-- Success -->
  <div class="success-wrap" id="successWrap">
    <span class="check-icon">✦</span>
    <div class="success-title">付款成功</div>
    <div class="success-sub">你的今生课题解读已解锁<br>点击下方按钮，立即开始</div>

    <div class="code-box">
      <div class="code-label">Soul Coordinates · 灵魂坐标兑换码</div>
      <div class="code-value" id="codeDisplay">--------</div>
      <div class="code-hint">共 3 次使用机会 · 有效期 30 天</div>
      <div class="code-meta">
        <div class="meta-item">
          <div class="meta-num">3</div>
          <div class="meta-txt">可用次数</div>
        </div>
        <div class="meta-item">
          <div class="meta-num">30</div>
          <div class="meta-txt">有效天数</div>
        </div>
        <div class="meta-item">
          <div class="meta-num">¥9.9</div>
          <div class="meta-txt">已支付</div>
        </div>
      </div>
    </div>

    <!-- 主按钮：倒计时自动跳转 -->
    <button class="use-btn" id="useBtn" onclick="useNow()">
      ✦ 立即开启我的今生课题解读 ✦
      <div class="countdown-bar" id="countdownBar"></div>
    </button>

    <!-- 次要操作：复制兑换码 -->
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">
      📋 复制兑换码备用
    </button>

    <div class="save-reminder">
      🔒 兑换码已与此订单绑定，30天内随时可用<br>
      如需再次查看，复制保存即可
    </div>
  </div>

  <!-- Error -->
  <div class="error-wrap" id="errorWrap">
    <span class="error-icon">⚠️</span>
    <div class="error-title">兑换码生成遇到问题</div>
    <div class="error-msg" id="errorMsg">
      付款已成功，但兑换码生成异常。<br>
      请截图此页面，联系客服处理。<br>
      订单号：<span id="errorOrderNo" style="color:var(--gold2)"></span>
    </div>
    <button class="retry-btn" onclick="location.reload()">重试</button>
  </div>

</div>

<script>
let generatedCode = ''

// ── 从 URL 参数获取订单信息（虎皮椒跳转时携带）──
function getParams() {
  const p = new URLSearchParams(window.location.search)
  return {
    tradeNo:   p.get('trade_no')    || p.get('out_trade_no') || '',
    totalFee:  p.get('total_fee')   || '990',   // 单位：分
    attach:    p.get('attach')      || '',       // 附加信息（可存手机号或备注）
    timeStamp: p.get('time_stamp')  || '',
    sign:      p.get('sign')        || '',
  }
}

// ── 生成唯一兑换码 ──
function makeCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
  return Array.from({ length: 8 }, () =>
    chars[Math.floor(Math.random() * chars.length)]
  ).join('')
}

// ── 写入 Supabase ──
async function createCode(tradeNo, attach) {
  // 先检查该订单是否已生成过兑换码（防重复）
  const checkRes = await fetch(
    `${CONFIG.SUPABASE_URL}/rest/v1/orders?trade_no=eq.${tradeNo}&select=id`,
    { headers: { 'apikey': CONFIG.SUPABASE_ANON, 'Authorization': `Bearer ${CONFIG.SUPABASE_ANON}` } }
  )
  const existing = await checkRes.json()

  // 如果已有订单记录，直接查对应兑换码返回
  if (existing.length > 0) {
    const orderId = existing[0].id
    const codeRes = await fetch(
      `${CONFIG.SUPABASE_URL}/rest/v1/codes?order_id=eq.${orderId}&select=code`,
      { headers: { 'apikey': CONFIG.SUPABASE_ANON, 'Authorization': `Bearer ${CONFIG.SUPABASE_ANON}` } }
    )
    const codeData = await codeRes.json()
    if (codeData.length > 0) return codeData[0].code
  }

  // 新订单：写入订单表
  const orderRes = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/orders`, {
    method: 'POST',
    headers: {
      'apikey': CONFIG.SUPABASE_ANON,
      'Authorization': `Bearer ${CONFIG.SUPABASE_ANON}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({
      trade_no: tradeNo,
      phone:    attach || 'unknown',
      amount:   9.90,
      status:   'paid',
      paid_at:  new Date().toISOString()
    })
  })
  const orderData = await orderRes.json()
  const orderId = orderData[0]?.id

  // 生成兑换码，确保唯一
  let code = makeCode()
  let attempts = 0
  while (attempts < 5) {
    const dupCheck = await fetch(
      `${CONFIG.SUPABASE_URL}/rest/v1/codes?code=eq.${code}&select=code`,
      { headers: { 'apikey': CONFIG.SUPABASE_ANON, 'Authorization': `Bearer ${CONFIG.SUPABASE_ANON}` } }
    )
    const dup = await dupCheck.json()
    if (!dup.length) break
    code = makeCode()
    attempts++
  }

  // 写入兑换码表
  const expires = new Date()
  expires.setDate(expires.getDate() + 30)

  await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/codes`, {
    method: 'POST',
    headers: {
      'apikey': CONFIG.SUPABASE_ANON,
      'Authorization': `Bearer ${CONFIG.SUPABASE_ANON}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      code,
      phone:       attach || 'unknown',
      order_id:    orderId,
      total_uses:  3,
      used_count:  0,
      is_active:   true,
      expires_at:  expires.toISOString()
    })
  })

  return code
}

// ── 复制兑换码 ──
function copyCode() {
  navigator.clipboard.writeText(generatedCode).then(() => {
    const btn = document.getElementById('copyBtn')
    btn.textContent = '✓ 已复制到剪贴板'
    btn.classList.add('copied')
    setTimeout(() => {
      btn.textContent = '📋 复制兑换码备用'
      btn.classList.remove('copied')
    }, 2000)
  }).catch(() => {
    // 降级方案：选中文字
    const el = document.getElementById('codeDisplay')
    const range = document.createRange()
    range.selectNode(el)
    window.getSelection().removeAllRanges()
    window.getSelection().addRange(range)
  })
}

// ── 立即使用：直接跳转并自动填入兑换码 ──
function useNow() {
  clearInterval(countdownTimer)
  // 传入 code 参数，主页面检测到后自动跳过输入步骤直接验证
  window.location.href = `${CONFIG.MAIN_URL}?code=${generatedCode}&autostart=1`
}

// ── 倒计时自动跳转（5秒）──
let countdownTimer = null
let countdownSec   = 5

function startCountdown() {
  const btn = document.getElementById('useBtn')

  // 在按钮里加一行倒计时文字
  const label = document.createElement('span')
  label.className  = 'countdown-label'
  label.id         = 'countdownLabel'
  label.textContent = `${countdownSec} 秒后自动跳转...`
  btn.appendChild(label)

  countdownTimer = setInterval(() => {
    countdownSec--
    const l = document.getElementById('countdownLabel')
    if (l) l.textContent = countdownSec > 0 ? `${countdownSec} 秒后自动跳转...` : '正在跳转...'
    if (countdownSec <= 0) {
      clearInterval(countdownTimer)
      useNow()
    }
  }, 1000)
}

// ── 显示错误 ──
function showError(msg, tradeNo) {
  document.getElementById('loadingWrap').style.display = 'none'
  document.getElementById('errorWrap').style.display   = 'block'
  document.getElementById('errorMsg').innerHTML =
    `付款已成功，但兑换码生成异常。<br>请截图此页面联系客服处理。<br>订单号：<span style="color:var(--gold2)">${tradeNo}</span>`
}

// ── 主流程 ──
async function init() {
  const params = getParams()

  if (!params.tradeNo) {
    showError('请通过正常购买流程访问此页面', '无')
    return
  }

  try {
    const code = await createCode(params.tradeNo, params.attach)
    generatedCode = code

    document.getElementById('loadingWrap').style.display = 'none'
    document.getElementById('successWrap').style.display = 'block'
    document.getElementById('codeDisplay').textContent   = code

    // 兑换码展示后启动倒计时自动跳转
    startCountdown()

  } catch(err) {
    console.error(err)
    showError(err.message, params.tradeNo)
  }
}

init()
</script>
</body>
</html>
